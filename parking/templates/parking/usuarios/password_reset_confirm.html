{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'parking/css/usuarios.css' %}">
</head>
<body>
<div class="login-container">
    <div class="login-card text-center" style="max-width:420px;">
        <img src="{% static 'parking/img/logo_horizontal.png' %}" width="220" class="mb-4" alt="Logo">
        <h5 style="color:black; font-weight:600;">Nueva contraseña</h5>
        {% if validlink %}
        <form method="post">
            {% csrf_token %}
            <div class="form-floating mb-3">
                <input type="password" name="new_password1" id="id_p1"
                       class="form-control" placeholder="Nueva contraseña" required>
                <label for="id_p1">Nueva contraseña</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" name="new_password2" id="id_p2"
                       class="form-control" placeholder="Confirmar contraseña" required>
                <label for="id_p2">Confirmar contraseña</label>
            </div>
            {% if form.errors %}
                <div class="alert alert-danger small py-2">{{ form.errors }}</div>
            {% endif %}
            <button type="submit" class="btn btn-navy w-100">Guardar nueva contraseña</button>
        </form>
        {% else %}
        <div class="alert alert-danger small">
            El enlace no es válido o ya fue usado. 
            <a href="{% url 'password_reset' %}">Solicita uno nuevo aquí.</a>
        </div>
        {% endif %}
    </div>
</div>
</body>
</html>
