{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Parqueadero</title>
    <link rel="icon" href="{% static 'parking/img/logo_solo.png' %}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'parking/css/registro.css' %}">
</head>
<body>
    {% include 'parking/components/_fondo_lineas.html' %}

    <div class="login-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <img src="{% static 'parking/img/logo_horizontal.png' %}" alt="Logo" width="280" class="mb-3">
                <p class="text-muted">Ingresa tus datos para registrarte</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger small py-2" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form id="formRegistro" method="POST" action="{% url 'registro' %}" novalidate>
    {% csrf_token %}
    
    <div class="row">
    <div class="col-12">
        <div class="form-floating mb-3 position-relative">
            <input type="text" id="id_username" name="username" class="form-control" placeholder="Ej: alejo_betan" required>
            <label for="id_username">Nombre de Usuario</label>
            <div id="error_username" class="invalid-feedback-custom"></div>
        </div>
    </div>
</div>
    
    <div class="row">
        <div class="col-md-6">
            <div class="form-floating mb-3">
                <input type="email" id="id_email" name="email" class="form-control" placeholder="ejemplo@correo.com" required>
                <label for="id_email">Correo Electrónico</label>
                <div id="error_email" class="invalid-feedback-custom"></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="form-floating mb-3">
                <input type="text" id="id_nombre_empresa" name="nombre_empresa" class="form-control" placeholder="Ej: Parqueadero Central" required>
                <label for="id_nombre_empresa">Nombre Comercial</label>
                <div id="error_nombre_empresa" class="invalid-feedback-custom"></div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="form-floating mb-3 position-relative">
            <input type="password" id="id_password" name="password" class="form-control" placeholder="••••••••" style="padding-right: 45px;" required>
            <label dfor="id_password">Contraseña</label>
            <button type="button" class="btn-toggle-eye" onclick="togglePasswordVisibility('id_password', this)">
                <i class="bi bi-eye-slash"></i> </button>
            <div id="error_password" class="invalid-feedback-custom"></div>
        </div>
        </div>
        <div class="col-md-6">
            <div class="form-floating mb-3 position-relative">
            <input type="password" id="id_password_confirm" name="password_confirm" class="form-control" placeholder="••••••••" style="padding-right: 45px;" required>
            <label for="id_password_confirm">Confirmar Contraseña</label>
            <button type="button" class="btn-toggle-eye" onclick="togglePasswordVisibility('id_password_confirm', this)">
                <i class="bi bi-eye-slash"></i> </button>
            <div id="error_password_confirm" class="invalid-feedback-custom"></div>
        </div>
        </div>
    </div>

    <div class="row mt-2">
        <div class="col-12">
            <button type="submit" id="btnSubmit" class="btn btn-navy w-100 mb-3" disabled>Registrarme</button>
        </div>
    </div>
</form>

            <div class="divider">O</div>

            <div class="d-grid gap-2">
                <button type="button" class="btn btn-google d-flex align-items-center justify-content-center gap-2">
                    <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" width="20" height="20">
                    Google
                </button>
            </div>

            <div class="text-center mt-3">
                <a href="{% url 'login' %}" class="login-link">Iniciar Sesión</a>
            </div>
        </div>
    </div>

    <script src="{% static 'parking/js/registro.js' %}"></script>
</body>
</html>
