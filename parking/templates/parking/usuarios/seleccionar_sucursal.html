{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paso 1: Seleccionar Sucursal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'parking/css/registro.css' %}">
</head>
<body>
    {% include 'parking/components/_fondo_lineas.html' %}

    <div class="login-container">
        <div class="login-card text-center" style="width: 100%; max-width: 450px;">
            <img src="{% static 'parking/img/logo_horizontal.png' %}" alt="Logo" width="240" class="mb-4">
            
            <h2 style="color: #000080; font-weight: 600; font-size: 24px;" class="mb-2">Paso 1: Seleccionar Sucursal</h2>
            <p class="text-muted mb-4">Elige el punto de venta donde vas a operar hoy</p>

            <form method="post" action="{% url 'seleccionar_sucursal' %}">
                {% csrf_token %}
                
                <div class="mb-4">
                    <select name="sucursal_id" class="form-select form-select-lg" style="border-radius: 8px; font-size: 16px;" required>
                        <option value="" disabled selected>-- Elige una sucursal --</option>
                        {% for sucursal in sucursales %}
                            <option value="{{ sucursal.id }}">{{ sucursal.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-navy btn-lg" style="font-size: 16px;">Cargar Punto de Trabajo →</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
