{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Parqueadero</title>
    <link rel="icon" href="{% static 'parking/img/logo_solo.png' %}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'parking/css/registro.css' %}">
</head>
<body>

    <div class="login-container">
        <div class="login-card" style="width: 100%; max-width: 450px;">
            <div class="text-center mb-4">
                <img src="{% static 'parking/img/logo_horizontal.png' %}" alt="Logo B&V" width="280" class="mb-2">
                <p class="text-muted small">Ingresa tus datos para continuar</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger small p-2 mb-3 text-center" style="border-radius: 8px;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="form-floating mb-3 position-relative">
                    <input type="text" name="login_input" id="id_login_input" class="form-control" placeholder="Usuario o Correo" required>
                    <label for="id_login_input">Nombre de Usuario o Correo</label>
                </div>

                <div class="form-floating mb-3 position-relative">
                    <input type="password" name="password" id="id_password" class="form-control" placeholder="••••••••" style="padding-right: 45px;" required>
                    <label for="id_password">Contraseña</label>
                    
                    <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y me-2" 
                            style="z-index: 10; border: none; background: transparent; color: #666;"
                            onclick="togglePasswordVisibility('id_password', this)">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>

                <div class="row mt-4">
                    <div class="col-12">
                        <button type="submit" class="btn btn-navy w-100 mb-3">Ingresar</button>
                        <div class="text-center mt-4" style="color: #666; font-size: 14px; text-decoration: none;"">
                            <p class="mb-0" style="color: #666; font-size: 14px;">¿Olvidaste tu contraseña? 
                                <a href="#" class="login-link" 
                                    style="color: #000080; font-weight: 600; text-decoration: none;">
                                    Recupérala aquí
                                </a>
                            </p>
                        </div>
                    </div>
                </div>
            </form>

            <div class="divider">O</div>

            <div class="d-grid gap-2">
                <button type="button" class="btn btn-google d-flex align-items-center justify-content-center gap-2">
                    <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" width="20" height="20">
                    Google
                </button>
            </div>

            <div class="text-center mt-4">
                <p class="mb-0" style="color: #666; font-size: 14px;">
                    ¿No tienes una cuenta? 
                    <a href="{% url 'registro' %}" class="login-link" 
                        style="color: #000080; font-weight: 600; text-decoration: none;">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector("i");
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("bi-eye-slash");
                icon.classList.add("bi-eye");
            } else {
                input.type = "password";
                icon.classList.remove("bi-eye");
                icon.classList.add("bi-eye-slash");
            }
        }
    </script>
</body>
</html>
