{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Parqueadero</title>

    <link rel="icon" type="image/png" href="{% static 'parking/img/favicon/favicon-96x96.png' %}" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="{% static 'parking/img/favicon/favicon.svg' %}" />
    <link rel="shortcut icon" href="{% static 'parking/img/favicon/favicon.ico' %}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'parking/img/favicon/apple-touch-icon.png' %}" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'parking/css/usuarios.css' %}">
</head>
<body>
    <div class="login-container">
        <div class="login-card" style="width:100%; max-width:450px;">
            <div class="text-center mb-4">
                <img src="{% static 'parking/img/logo_horizontal.png' %}" alt="Logo B&V"
                     class="img-fluid mb-2" style="max-width:280px;">
                <p class="text-muted small">Ingresa tus datos para continuar</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger small p-2 mb-3 text-center" style="border-radius:8px;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.GET.next }}">

                <div class="form-floating mb-3">
                    <input type="text" name="login_input" id="id_login_input"
                           class="form-control" placeholder="Usuario o Correo" required>
                    <label for="id_login_input">Nombre de Usuario o Correo</label>
                </div>

                <div class="form-floating mb-3 position-relative">
                    <input type="password" name="password" id="id_password"
                           class="form-control" placeholder="••••••••"
                           style="padding-right:45px;" required>
                    <label for="id_password">Contraseña</label>
                    <button type="button"
                            class="btn position-absolute top-50 end-0 translate-middle-y me-2"
                            style="z-index:10; border:none; background:transparent; color:#666;"
                            onclick="togglePasswordVisibility('id_password', this)">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>

                <!-- Recordarme + Olvidaste contraseña -->
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox"
                               name="recordarme" id="id_recordarme">
                        <label class="form-check-label small" for="id_recordarme"
                               style="color:#666;">
                            Recordarme
                        </label>
                    </div>
                    <p class="mb-0 small" style="color: #666; font-size: 14px;">¿Olvidaste tu contraseña? 
                        <a href="{% url 'password_reset' %}" class="login-link" 
                            style="color: #000080; font-weight: 600; text-decoration: none;">
                            Recupérala aquí
                        </a>
                    </p>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-navy btn-lg"
                            style="font-size:16px;">
                        Ingresar
                    </button>
                </div>
            </form>

            <div class="divider">Otra forma de iniciar sesión</div>

            <div class="d-grid gap-2">
                <button type="button"
                        class="btn btn-google d-flex align-items-center justify-content-center gap-2">
                    <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg"
                         width="20" height="20">
                        Google
                </button>
            </div>

            <div class="text-center mt-4">
                <p class="mb-0 small" style="color:#666;">
                    ¿No tienes una cuenta?
                    <a href="{% url 'registro' %}"
                       style="color:#000080; font-weight:600; text-decoration:none;">
                       Regístrate aquí
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script>
    function togglePasswordVisibility(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon  = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        }
    }
    </script>
</body>
</html>
