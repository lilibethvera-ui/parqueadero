{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'parking/css/registro.css' %}">
</head>
<body>
<div class="login-container">
    <div class="login-card text-center" style="max-width:420px;">
        <img src="{% static 'parking/img/logo_horizontal.png' %}" width="220" class="mb-4" alt="Logo">
        <h5 style="color:black; font-weight:600;">Recuperar contraseña</h5>
        <p class="text-muted small mb-4">
            Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
        </p>
        <form method="post">
            {% csrf_token %}
            <div class="form-floating mb-3">
                <input type="email" name="email" id="id_email"
                       class="form-control" placeholder="correo@ejemplo.com" required>
                <label for="id_email">Correo electrónico</label>
            </div>
            <button type="submit" class="btn btn-navy w-100">
                Enviar enlace de recuperación
            </button>
        </form>
        <div class="mt-3">
            <a href="{% url 'login' %}" class="login-link" style="color: #000080; font-weight: 600; text-decoration: none;">← Volver al login</a>
        </div>
    </div>
</div>
</body>
</html>
